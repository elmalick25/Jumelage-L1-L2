<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Jumelage L1 × L2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --border: #2a2a3a;
    --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e97b;
    --text: #e8e8f0; --muted: #7a7a9a; --l1: #ff6584; --l2: #6c63ff;
    --wa: #25d366;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(108,99,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(108,99,255,.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .glow-1 { width: 500px; height: 500px; background: rgba(108,99,255,.12); top: -150px; left: -100px; }
  .glow-2 { width: 400px; height: 400px; background: rgba(255,101,132,.08); bottom: -100px; right: -100px; }

  /* LOGIN */
  #loginScreen { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg); }
  .login-box { position: relative; z-index: 1; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 400px; text-align: center; animation: fadeUp .5s ease; }
  .lock-icon { font-size: 48px; margin-bottom: 16px; }
  .login-box h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
  .login-field { position: relative; margin-bottom: 12px; }
  .login-field input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 48px 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color .2s, box-shadow .2s; letter-spacing: 3px; text-align: center; }
  .login-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.15); }
  .login-field input.shake { animation: shake .3s ease; border-color: var(--l1); }
  .login-error { color: var(--l1); font-size: 13px; margin-bottom: 12px; min-height: 18px; }
  .btn-login { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; }
  .btn-login:hover { background: #7c74ff; box-shadow: 0 8px 24px rgba(108,99,255,.4); }

  /* MAIN */
  #mainApp { display: none; }
  .topbar { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; gap: 16px; }
  .topbar-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px; flex: 1; }
  .admin-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(108,99,255,.2); color: var(--accent); font-weight: 600; }

  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--accent3); background: rgba(67,233,123,.1); border: 1px solid rgba(67,233,123,.2); padding: 4px 10px; border-radius: 20px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); animation: pulse 1.5s infinite; }

  .btn-logout { background: rgba(255,101,132,.12); border: 1px solid rgba(255,101,132,.2); color: var(--l1); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; }

  .wrapper { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 36px 24px 80px; }

  .tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 6px; gap: 6px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 12px; border-radius: 10px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .25s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .tab.active { background: var(--card); color: var(--text); box-shadow: 0 2px 12px rgba(0,0,0,.4); }

  .panel { display: none; animation: fadeUp .4s ease both; }
  .panel.active { display: block; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 18px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; text-align: center; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }

  .students-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .level-header { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .count-chip { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

  .student-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; background: var(--surface); margin-bottom: 6px; font-size: 13px; animation: fadeUp .3s ease both; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .avatar-l1 { background: rgba(255,101,132,.2); color: var(--l1); }
  .avatar-l2 { background: rgba(108,99,255,.2); color: var(--l2); }

  .btn { padding: 11px 22px; border-radius: 10px; border: none; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-success { background: var(--accent3); color: #000; }
  .btn-danger { background: rgba(255,101,132,.15); color: var(--l1); border: 1px solid rgba(255,101,132,.3); }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  
  /* WHATSAPP BUTTONS & DISABLED STATE */
  .btn-wa { background: rgba(37, 211, 102, 0.12); color: var(--wa); border: 1px solid rgba(37, 211, 102, 0.25); padding: 6px 12px; font-size: 11px; font-weight: 700; border-radius: 8px; transition: all .2s; cursor: pointer; }
  .btn-wa:hover:not(.sent) { background: var(--wa); color: #fff; transform: translateY(-1px); }
  
  /* Nouveau style pour les boutons déjà cliqués */
  .btn-wa.sent { 
    background: rgba(255, 255, 255, 0.05); 
    color: var(--muted); 
    border-color: transparent; 
    cursor: not-allowed; 
    pointer-events: none; 
    box-shadow: none;
  }

  .pair-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 18px; animation: fadeUp .4s ease both; }
  .pair-header { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 14px; }
  .pair-student { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: 10px; padding: 8px 12px; flex: 1; }
  
  .filleuls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; padding-left: 30px; }
  .filleul-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; padding: 8px 12px; border: 1px solid var(--border); }

  .scrollable { max-height: 380px; overflow-y: auto; }
  .toast-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,.5); animation: slideIn .3s ease; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  @media (max-width: 600px) {
    .students-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr; }
    .filleuls-grid { padding-left: 0; }
  }
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="toast-container" id="toastContainer"></div>

<div id="loginScreen">
  <div class="login-box">
    <div class="lock-icon">🔐</div>
    <h2>Espace Admin</h2>
    <p>Commission Sociale — Club Informatique</p>
    <div class="login-field"><input type="password" id="pwdInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') connexion()"></div>
    <div class="login-error" id="loginError"></div>
    <button class="btn-login" onclick="connexion()">Accéder →</button>
  </div>
</div>

<div id="mainApp">
  <div class="topbar">
    <div class="topbar-title">🔗 Jumelage <span class="admin-badge">ADMIN</span></div>
    <div class="live-badge"><span class="live-dot"></span> Temps réel</div>
    <button class="btn-logout" onclick="deconnexion()">Déconnexion</button>
  </div>

  <div class="wrapper">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('etudiants')">👥 Liste</button>
      <button class="tab" onclick="switchTab('jumelage')">🔗 Jumelage</button>
      <button class="tab" onclick="switchTab('parametres')">⚙️ Paramètres</button>
    </div>

    <div class="panel active" id="panel-etudiants">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-l1" style="color:var(--l1)">0</div><div class="stat-label">Filleuls L1</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-l2" style="color:var(--l2)">0</div><div class="stat-label">Parrains L2</div></div>
      </div>
      <div class="card">
        <div class="students-grid">
          <div>
            <div class="level-header" style="color:var(--l1)">Licence 1 <span class="count-chip" id="chip-l1">0</span></div>
            <div class="scrollable" id="list-l1"></div>
          </div>
          <div>
            <div class="level-header" style="color:var(--l2)">Licence 2 <span class="count-chip" id="chip-l2">0</span></div>
            <div class="scrollable" id="list-l2"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-jumelage">
      <div class="card">
        <div class="card-title">🚀 Lancement de l'Algorithme</div>
        <p style="color:var(--muted); font-size:14px; margin-bottom:20px;">Répartition équitable (1 parrain pour 3-4 filleuls). Les notifications WhatsApp sont prêtes après calcul.</p>
        <div class="btn-row">
          <button class="btn btn-success" onclick="lancerJumelage()">🔗 Lancer le Jumelage</button>
          <button class="btn btn-ghost" onclick="exporterJumelage()">📤 Export CSV</button>
        </div>
      </div>
      <div id="jumelage-results" style="display:none;">
        <div id="pairs-list"></div>
      </div>
    </div>

    <div class="panel" id="panel-parametres">
      <div class="card"><button class="btn btn-danger" onclick="viderListe()">🗑 Effacer toute la base</button></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCHOPejlHwDUZpwW-EVEIy41pGOoscB4qs",
    authDomain: "jumelage-l1-l2.firebaseapp.com",
    databaseURL: "https://jumelage-l1-l2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jumelage-l1-l2",
    storageBucket: "jumelage-l1-l2.firebasestorage.app",
    messagingSenderId: "374198147269",
    appId: "1:374198147269:web:66542058a905bf952df8ac"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window._startListen = () => {
    onValue(ref(db, 'etudiants'), (snap) => {
      const data = snap.val();
      window._etudiants = data ? Object.entries(data).map(([k, v]) => ({ ...v, _key: k })) : [];
      if (window._onEtudiantsUpdate) window._onEtudiantsUpdate(window._etudiants);
    });
  };
  window._clearAll = () => remove(ref(db, 'etudiants'));
</script>

<script>
  // LOGIN / DECONNEXION
  function connexion() {
    if (document.getElementById('pwdInput').value === 'admin2024') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      sessionStorage.setItem('jumelage_auth', '1');
      document.getElementById('pwdInput').value = '';
      demarrer();
    } else {
      const el = document.getElementById('pwdInput');
      el.classList.add('shake');
      setTimeout(() => el.classList.remove('shake'), 400);
      document.getElementById('loginError').textContent = '❌ Mot de passe incorrect.';
      setTimeout(() => document.getElementById('loginError').textContent = '', 2500);
    }
  }

  function deconnexion() {
    sessionStorage.removeItem('jumelage_auth');
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  // INITIALISATION
  function demarrer() {
    window._onEtudiantsUpdate = renderEtudiants;
    setTimeout(() => { if(window._startListen) window._startListen(); }, 500);
  }

  // GESTION DES LISTES
  function renderEtudiants(list) {
    const l1 = list.filter(e => e.niveau === 'L1');
    const l2 = list.filter(e => e.niveau === 'L2');
    document.getElementById('stat-total').textContent = list.length;
    document.getElementById('stat-l1').textContent = l1.length;
    document.getElementById('stat-l2').textContent = l2.length;
    document.getElementById('chip-l1').textContent = l1.length;
    document.getElementById('chip-l2').textContent = l2.length;
    renderList('list-l1', l1, 'l1');
    renderList('list-l2', l2, 'l2');
  }

  function renderList(id, data, lvl) {
    if (!data.length) {
      document.getElementById(id).innerHTML = `<div style="text-align:center; color:var(--muted); padding:20px">Aucun étudiant</div>`;
      return;
    }
    document.getElementById(id).innerHTML = data.map(e => `
      <div class="student-item">
        <div class="avatar avatar-${lvl}">${e.prenom[0]}</div>
        <div style="flex:1"><b>${e.prenom} ${e.nom}</b><br><small>${e.telephone}</small></div>
      </div>
    `).join('');
  }

  async function viderListe() {
    if (!confirm('Attention : Effacer TOUS les étudiants de la base de données ? C\'est irréversible.')) return;
    try {
      await window._clearAll();
      showToast('Base de données vidée avec succès.');
    } catch(e) {
      alert("Erreur lors de la suppression.");
    }
  }

  // JUMELAGE 1:N
  let currentGroupes = [];

  function lancerJumelage() {
    const l1 = shuffle([...window._etudiants.filter(e => e.niveau === 'L1')]);
    const l2 = shuffle([...window._etudiants.filter(e => e.niveau === 'L2')]);
    
    if(!l1.length || !l2.length) return alert("Il faut au moins un L1 et un L2 dans la base !");

    currentGroupes = l2.map(p => ({ parrain: p, filleuls: [] }));
    l1.forEach((f, i) => currentGroupes[i % l2.length].filleuls.push(f));

    document.getElementById('jumelage-results').style.display = 'block';
    const container = document.getElementById('pairs-list');
    
    container.innerHTML = currentGroupes.map((g, i) => {
      // Vérification spécifique pour Mamadou Sy
      const isMamadouSy = g.parrain.prenom.trim().toLowerCase() === 'mamadou' && g.parrain.nom.trim().toLowerCase() === 'sy';
      const btnClass = isMamadouSy ? 'btn-wa sent' : 'btn-wa';
      const btnText = isMamadouSy ? '✓ Déjà informé' : '📱 Informer Parrain';
      const btnClick = isMamadouSy ? '' : `onclick="notifierParrain(${i}, this)"`;

      return `
      <div class="pair-card">
        <div class="pair-header">
          <div class="pair-student" style="background: rgba(108,99,255,0.08);">
            <div class="avatar avatar-l2">${g.parrain.prenom[0]}</div>
            <div style="flex:1"><b>${g.parrain.prenom} ${g.parrain.nom} (Parrain L2)</b><br><small>${g.parrain.telephone}</small></div>
            <button class="${btnClass}" ${btnClick}>${btnText}</button>
          </div>
        </div>
        <div class="filleuls-grid">
          ${g.filleuls.map((f, fi) => `
            <div class="filleul-item">
              <div class="avatar avatar-l1" style="width:24px;height:24px;font-size:10px">${f.prenom[0]}</div>
              <div style="flex:1; font-size:12px"><b>${f.prenom} ${f.nom}</b></div>
              <button class="btn-wa" style="padding:4px 6px" title="Informer ce filleul" onclick="notifierFilleul(${i}, ${fi}, this)">📱</button>
            </div>
          `).join('')}
        </div>
      </div>
    `}).join('');
    showToast("Algorithme terminé !");
  }

  // WHATSAPP FUNCTIONS
  function notifierParrain(idx, btnElement) {
    const g = currentGroupes[idx];
    const listeFilleuls = g.filleuls.map(f => `- ${f.prenom} ${f.nom} (${f.telephone})`).join('%0A');
    const msg = `Salut ${g.parrain.prenom}, voici tes ${g.filleuls.length} filleuls :%0A${listeFilleuls}%0AÀ toi de créer le groupe !`;
    
    // Ouvre WhatsApp
    window.open(`https://wa.me/${formatTel(g.parrain.telephone)}?text=${msg}`);
    
    // Change l'état du bouton pour bloquer les futurs clics
    btnElement.className = 'btn-wa sent';
    btnElement.innerText = '✓ Envoyé';
    btnElement.onclick = null; 
  }

  function notifierFilleul(gIdx, fIdx, btnElement) {
    const p = currentGroupes[gIdx].parrain;
    const f = currentGroupes[gIdx].filleuls[fIdx];
    const msg = `Salut ${f.prenom}, ton parrain est ${p.prenom} ${p.nom}. Voici son numéro : ${p.telephone}. Contacte-le pour ton intégration !`;
    
    // Ouvre WhatsApp
    window.open(`https://wa.me/${formatTel(f.telephone)}?text=${msg}`);

    // Change l'état du bouton
    btnElement.className = 'btn-wa sent';
    btnElement.innerText = '✓';
    btnElement.onclick = null;
  }

  // EXPORT CSV
  function exporterJumelage() {
    if (!currentGroupes.length) { alert('Lancez d\'abord le jumelage !'); return; }
    const rows = ['Groupe,Parrain Nom,Parrain Prénom,Parrain Téléphone,Filleul Nom,Filleul Prénom,Filleul Téléphone'];
    currentGroupes.forEach((groupe, i) => {
      groupe.filleuls.forEach(filleul => {
        rows.push(`${i+1},${groupe.parrain.nom},${groupe.parrain.prenom},${groupe.parrain.telephone},${filleul.nom},${filleul.prenom},${filleul.telephone}`);
      });
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'}));
    a.download = 'Resultats_Jumelage.csv'; a.click();
    showToast('📤 Export téléchargé');
  }

  // UTILS
  function formatTel(t) { return t.replace(/\D/g, ''); }
  function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
  
  function switchTab(t) {
    ['etudiants','jumelage','parametres'].forEach(id => {
      document.getElementById('panel-'+id).classList.toggle('active', id===t);
      document.querySelectorAll('.tab')[['etudiants','jumelage','parametres'].indexOf(id)].classList.toggle('active', id===t);
    });
  }

  function showToast(m) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = "✅ " + m;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // AUTO-LOGIN SI DEJA CONNECTE
  if (sessionStorage.getItem('jumelage_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    setTimeout(demarrer, 500);
  }
</script>
</body>
</html>
